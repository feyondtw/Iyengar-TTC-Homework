<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Iyengar Practice Sequence · 序列手冊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F5F1E8;
    --paper:#FBF8F1;
    --ink:#2F2A24;
    --muted:#7C7468;
    --line:rgba(47,42,36,0.14);
    --line-soft:rgba(47,42,36,0.08);
    /* category colours */
    --c-stand:#EFD9CC;   --c-stand-ink:#9C6B4E;
    --c-rot:#D6E0C7;     --c-rot-ink:#5E7148;
    --c-bend:#EADBBC;    --c-bend-ink:#9A7C42;
    --c-inv:#D6D9E6;     --c-inv-ink:#5C6291;
    --c-base:#E4DFD3;    --c-base-ink:#85796A;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#E7E2D6;
    font-family:'Inter','Noto Sans TC',system-ui,sans-serif;color:var(--ink);
    -webkit-font-smoothing:antialiased}
  .sheet{
    width:1240px;margin:0 auto;padding:28px 0 48px;position:relative;
  }
  /* ── Page frame (landscape A4 ratio, WYSIWYG) ── */
  .page{
    width:1240px;min-height:876px;background:var(--cream);
    margin:0 auto 26px;padding:46px 52px;box-sizing:border-box;
    box-shadow:0 14px 44px rgba(47,42,36,0.15);
    display:flex;flex-direction:column;overflow:hidden;position:relative;
  }
  .page.pose{justify-content:flex-start}
  .page .pageband{display:flex;align-items:baseline;gap:14px;margin-bottom:20px;
    border-bottom:1px solid var(--line);padding-bottom:14px}
  .page .pageband .num{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--muted);font-weight:500}
  .page .pageband .t{font-family:'Cormorant Garamond','Noto Serif TC',serif;font-size:24px;font-weight:500}
  .page .pageband .tc{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--muted);letter-spacing:0.06em}
  .page .pageband .rule{flex:1;height:1px;background:var(--line);align-self:center}
  .page .pagefoot{margin-top:auto;padding-top:16px;display:flex;justify-content:space-between;
    align-items:center;font-size:10px;color:var(--muted);letter-spacing:0.1em}
  .page .pagefoot .brand{font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:0.18em;color:var(--ink)}

  /* ── Header ── */
  .hd{display:flex;justify-content:space-between;align-items:flex-start;
    border-bottom:1px solid var(--line);padding-bottom:26px;margin-bottom:8px}
  .hd h1{font-family:'Cormorant Garamond','Noto Serif TC',serif;font-weight:500;
    font-size:46px;letter-spacing:-0.01em;margin:0;line-height:1.02}
  .hd .sub{font-family:'Noto Serif TC',serif;font-size:19px;color:var(--muted);
    margin-top:8px;letter-spacing:0.06em}
  .hd .meta{text-align:right;font-size:12px;color:var(--muted);letter-spacing:0.04em;line-height:1.7}
  .hd .meta b{color:var(--ink);font-weight:500}

  .legend{display:flex;gap:22px;flex-wrap:wrap;margin:22px 0 4px}
  .legend .it{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted);letter-spacing:0.03em}
  .legend .dot{width:14px;height:14px;border-radius:50%;flex:none}
  .legend .it b{color:var(--ink);font-weight:500;margin-right:2px}

  .summary{display:flex;gap:14px;margin:24px 0 8px;flex-wrap:wrap}
  .summary .stat{background:var(--paper);border:1px solid var(--line-soft);
    border-radius:12px;padding:14px 22px;display:flex;align-items:baseline;gap:10px}
  .summary .stat .n{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;line-height:1}
  .summary .stat .l{font-size:12px;color:var(--muted);letter-spacing:0.1em}

  /* ── Section ── */
  .section{margin-top:42px}
  .section-hd{display:flex;align-items:baseline;gap:16px;margin-bottom:22px}
  .section-hd .num{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--muted);font-weight:500}
  .section-hd .t{font-family:'Cormorant Garamond','Noto Serif TC',serif;font-size:30px;font-weight:500;letter-spacing:-0.005em}
  .section-hd .tc{font-family:'Noto Serif TC',serif;font-size:17px;color:var(--muted);letter-spacing:0.08em}
  .section-hd .rule{flex:1;height:1px;background:var(--line);align-self:center}

  /* ── Card grid ── */
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .card{background:var(--paper);border:1px solid var(--line-soft);border-radius:14px;
    overflow:hidden;display:flex;flex-direction:column}
  .card.span-2{grid-column:span 2}
  .card.span-3{grid-column:span 3}
  .card.span-4{grid-column:span 4}
  .card .photo{width:100%;background:#ECE6DA;position:relative;
    overflow:hidden;display:grid;gap:4px}
  .shot{position:relative;overflow:hidden;height:340px;background:#ECE6DA}
  .shot .ph-img{width:100%;height:100%;object-fit:contain;display:block}
  .shot .ph-img.missing{display:none}
  .shot .ph-img.loaded + .ph-empty{display:none}
  .shot .ph-empty{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;text-align:center;padding:14px;
    color:var(--muted)}
  .shot .ph-empty svg{opacity:0.5}
  .shot .ph-empty span{font-family:'Cormorant Garamond','Noto Serif TC',serif;font-size:13px;line-height:1.3;opacity:0.8}
  .shot .cap{position:absolute;left:8px;bottom:8px;background:rgba(47,42,36,0.62);
    color:#F5F1E8;font-size:10.5px;padding:3px 9px;border-radius:999px;
    letter-spacing:0.05em;font-family:'Noto Sans TC',sans-serif;backdrop-filter:blur(2px);z-index:2}
  .card .body{padding:14px 15px 16px;display:flex;flex-direction:column;flex:1}
  /* wide cards: text sits in a row, points flow in columns */
  .card.wide .body{flex-direction:row;align-items:flex-start;gap:30px}
  .card.wide .body .info{flex:none;width:300px}
  .card.wide .body ul{margin:2px 0 0;display:grid;grid-auto-flow:column;
    grid-template-rows:repeat(2,auto);gap:6px 28px;align-content:start}
  .card .toprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .card .ord{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--ink);line-height:1}
  .chip{font-size:10.5px;letter-spacing:0.06em;padding:4px 10px;border-radius:999px;font-weight:500;white-space:nowrap}
  .card .en{font-family:'Cormorant Garamond','Noto Serif TC',serif;font-size:17.5px;font-weight:600;
    line-height:1.2;margin-bottom:3px;letter-spacing:-0.005em}
  .card .tc{font-family:'Noto Serif TC',serif;font-size:13.5px;color:var(--muted);margin-bottom:11px;letter-spacing:0.04em}
  .card ul{margin:auto 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:5px}
  .card li{font-size:11.5px;line-height:1.45;color:var(--ink);padding-left:13px;position:relative;letter-spacing:0.01em}
  .card li::before{content:'';position:absolute;left:2px;top:6px;width:4px;height:4px;border-radius:50%;background:var(--muted)}
  .card .pt-en{display:block;font-family:'Cormorant Garamond',serif;font-weight:500;
    font-size:13px;color:var(--ink);letter-spacing:0.005em;line-height:1.3}
  .card .pt-tc{display:block;font-family:'Noto Serif TC',serif;
    font-size:10.5px;color:var(--muted);letter-spacing:0.02em;margin-top:1px}
  .card .note{margin-top:13px;padding:11px 13px;background:rgba(94,113,72,0.07);
    border-left:2px solid var(--c-rot-ink);border-radius:0 8px 8px 0}
  .card .note-en{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:12.5px;line-height:1.45;color:var(--ink);letter-spacing:0.005em}
  .card .note-tc{display:block;font-family:'Noto Serif TC',serif;font-size:10.5px;
    line-height:1.5;color:var(--muted);margin-top:5px;letter-spacing:0.02em}

  /* category accents */
  .cat-stand .chip{background:var(--c-stand);color:var(--c-stand-ink)}
  .cat-rot   .chip{background:var(--c-rot);color:var(--c-rot-ink)}
  .cat-bend  .chip{background:var(--c-bend);color:var(--c-bend-ink)}
  .cat-inv   .chip{background:var(--c-inv);color:var(--c-inv-ink)}
  .cat-base  .chip{background:var(--c-base);color:var(--c-base-ink)}
  .cat-stand .photo{background:linear-gradient(180deg,#F4E6DC,#EAD7C9)}
  .cat-rot   .photo{background:linear-gradient(180deg,#E4ECD6,#D6E0C7)}
  .cat-bend  .photo{background:linear-gradient(180deg,#F1E6CB,#E6D6B4)}
  .cat-inv   .photo{background:linear-gradient(180deg,#E3E5EE,#D4D8E6)}
  .cat-base  .photo{background:linear-gradient(180deg,#EDE8DC,#E0DACE)}

  /* ── Flow overview ── */
  .flow{margin-top:48px;border-top:1px solid var(--line);padding-top:30px}
  .flow .lbl{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--muted);letter-spacing:0.1em;margin-bottom:18px}
  .flowrow{display:flex;flex-wrap:wrap;gap:7px 8px;align-items:center}
  .fchip{font-size:11px;padding:7px 11px;border-radius:8px;font-weight:500;letter-spacing:0.02em;line-height:1.1;display:flex;align-items:center;gap:7px}
  .fchip .fn{font-family:'Cormorant Garamond',serif;font-size:14px;opacity:0.6;align-self:flex-start;margin-top:1px}
  .fchip-txt{display:flex;flex-direction:column;gap:1px}
  .fchip-en{font-family:'Cormorant Garamond',serif;font-size:12.5px;font-weight:600;letter-spacing:0;line-height:1.15}
  .fchip-tc{font-family:'Noto Serif TC',serif;font-size:9.5px;opacity:0.62;letter-spacing:0.04em;line-height:1.2}
  .farrow{color:var(--muted);font-size:13px;opacity:0.55}

  .foot{margin-top:40px;border-top:1px solid var(--line-soft);padding-top:18px;
    display:flex;justify-content:space-between;align-items:center;
    font-size:11px;color:var(--muted);letter-spacing:0.08em}
  .foot .brand{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:0.18em;color:var(--ink)}

  .hint{max-width:1440px;margin:0 auto 4px;padding:14px 22px;background:#fff;border-radius:12px;
    font-size:12.5px;color:var(--muted);line-height:1.6;border:1px solid var(--line-soft)}
  .hint b{color:var(--ink)}

  /* ── Pose-page internals ── */
  .page .photo{margin-bottom:18px;border-radius:12px;background:transparent;
    display:grid;gap:4px;overflow:hidden;position:relative}
  .page .poseinfo{display:flex;gap:30px;align-items:flex-start}
  .page .poseinfo ul{display:grid;grid-template-columns:repeat(3,1fr);gap:9px 26px;
    flex:1;margin:0;padding:0;list-style:none}
  .page .poseinfo li{font-size:13px;line-height:1.4;color:var(--ink);padding-left:14px;position:relative}
  .page .poseinfo li::before{content:'';position:absolute;left:2px;top:7px;width:5px;height:5px;border-radius:50%;background:var(--muted)}
  .page .poseinfo .pt-en{display:block;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:14.5px;color:var(--ink);line-height:1.25}
  .page .poseinfo .pt-tc{display:block;font-family:'Noto Serif TC',serif;font-size:11.5px;color:var(--muted);margin-top:1px;letter-spacing:0.02em}
  .page .poseinfo .note{flex:0 0 340px;padding:12px 15px;background:rgba(94,113,72,0.07);
    border-left:2px solid var(--c-rot-ink);border-radius:0 8px 8px 0}
  .page .poseinfo .note-en{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;line-height:1.5;color:var(--ink)}
  .page .poseinfo .note-tc{display:block;font-family:'Noto Serif TC',serif;font-size:11.5px;line-height:1.55;color:var(--muted);margin-top:6px}
  .page .pageband .chip{align-self:center}

  @media print{
    html,body{background:#fff}
    .hint{display:none}
    .sheet{width:100%;margin:0;padding:0}
    @page{size:landscape;margin:0}
    .page{width:100%;min-height:auto;height:auto;margin:0;box-shadow:none;
      padding:7mm 9mm;break-after:page;page-break-after:always;
      break-inside:avoid;page-break-inside:avoid}
    .page:last-child{break-after:auto;page-break-after:auto}
  }
</style>
</head>
<body>

<div class="sheet">

  <div class="page cover">
    <div class="hd">
      <div>
        <h1>Iyengar Practice Sequence</h1>
        <div class="sub">完整序列功課 · 站姿 · 扭轉 · 前彎 · 倒立 · 收攝</div>
      </div>
      <div class="meta">
        MUYOGA · DHYANA<br/>
        19 Asanas · <b>5 Standing · 4 Rotation · 4 Forward Bend</b><br/>
        Rope Wall &amp; Props
      </div>
    </div>

    <div class="legend" id="legend"></div>

    <div class="summary">
      <div class="stat"><span class="n">5</span><span class="l">STANDING · 站姿</span></div>
      <div class="stat"><span class="n">4</span><span class="l">ROTATION · 扭轉</span></div>
      <div class="stat"><span class="n">4</span><span class="l">FORWARD BEND · 前彎</span></div>
      <div class="stat"><span class="n">2</span><span class="l">INVERSION · 倒立</span></div>
      <div class="stat"><span class="n">19</span><span class="l">TOTAL · 全序列</span></div>
    </div>

    <div class="flow">
      <div class="lbl">序列流動 · Sequence Flow</div>
      <div class="flowrow" id="flowrow"></div>
    </div>

    <div class="foot">
      <span>靜下來，回到根本。</span>
      <span class="brand">MUYOGA</span>
      <span>© 2026 DHYANA · Iyengar Yoga</span>
    </div>
  </div>

  <div id="pages"></div>

</div>

<script>
  // ── Category definitions ──
  const CAT = {
    stand: { cls:'cat-stand', label:'站姿 Standing', dot:'#EFD9CC' },
    rot:   { cls:'cat-rot',   label:'扭轉 Rotation', dot:'#D6E0C7' },
    bend:  { cls:'cat-bend',  label:'前彎 Forward Bend', dot:'#EADBBC' },
    inv:   { cls:'cat-inv',   label:'倒立 Inversion', dot:'#D6D9E6' },
    base:  { cls:'cat-base',  label:'準備 / 坐姿 / 收攝', dot:'#E4DFD3' },
  };

  // ── Pose data ── (key points are bilingual: "中文|English")
  const SECTIONS = [
    {
      num:'一', t:'Standing Sequence', tc:'站姿序列',
      poses:[
        { id:'p01', cat:'base',  tag:'Supine 躺姿', en:'Urdhva Prasarita Padasana 90°', tc:'仰臥抬腿 90°',
          pts:['核心鍛鍊與髖屈肌強化|Core & hip-flexor strength','喚醒身體中心|Awaken the center','為站姿序列暖身|Warm up for standing'] },
        { id:'p02', cat:'stand', tag:'Standing I', en:'Prasarita Padottanasana', tc:'寬腿站姿前彎',
          pts:['延展腿後側與身側|Lengthen hamstrings & sides','建立雙腳與骨盆穩定|Stabilise feet & pelvis','為後續站姿做準備|Prepare for standing poses'] },
        { id:'p03', cat:'bend',  tag:'Bend Forward I', en:'Adho Mukha Svanasana (in Prasarita)', tc:'下犬式（寬腿）', shots:2,
          pts:['延伸脊柱與腿後鏈|Extend spine & posterior chain','連結站姿與前彎|Link standing & forward bend','延展肩帶|Open the shoulders'] },
        { id:'p04', cat:'rot',   tag:'Rotation I', en:'Parivrtta Prasarita Padottanasana', tc:'扭轉寬腿前彎', shots:['Original 1','Original 2','Original 3','Original 4','Adjusted 1','Adjusted 2','Adjusted 3','Adjusted 4'],
          note:'Working freely on the mat, the chest and side body tend to collapse during the twist. Wall support and props are used to lift and realign.|墊上徒手練習時，扭轉中左右身側容易下陷，因此以靠牆與輔具協助調整、重新對位。',
          pts:['脊椎扭轉|Spinal rotation','打開胸腔|Open the chest','刺激腹部器官|Stimulate abdominal organs'] },
        { id:'p05', cat:'stand', tag:'Standing II', en:'Utthita Trikonasana', tc:'伸展三角式', shots:3,
          pts:['拉長側身|Lengthen the side body','建立下肢穩定與延伸感|Stable, extended legs','打開髖部與胸腔|Open hips & chest'] },
        { id:'p06', cat:'stand', tag:'Standing III', en:'Ardha Chandrasana', tc:'半月式', shots:3,
          pts:['平衡與核心控制|Balance & core control','強化站立腿|Strengthen standing leg','建立側身延伸與穩定|Side extension & stability'] },
        { id:'p07', cat:'stand', tag:'Standing IV', en:'Parivrtta Trikonasana', tc:'扭轉三角式', shots:2,
          pts:['脊椎扭轉|Spinal rotation','刺激內臟|Stimulate the organs','增強專注力與平衡感|Focus & balance'] },
        { id:'p08', cat:'stand', tag:'Standing V', en:'Parivrtta Ardha Chandrasana', tc:'扭轉半月式', shots:2,
          pts:['進階扭轉與平衡|Advanced twist & balance','增加脊椎旋轉深度|Deepen spinal rotation','提升專注與穩定|Sharpen focus & stability'] },
        { id:'p09', cat:'base',  tag:'Standing 收攝', en:'Prasarita Padottanasana (final)', tc:'寬腿站姿前彎（收攝）', shots:3,
          pts:['釋放與回收|Release & recover','讓身體回到對稱|Return to symmetry','為倒立做準備|Prepare for inversion'] },
      ]
    },
    {
      num:'二', t:'Inversions & Forward Bends', tc:'倒立與前彎',
      poses:[
        { id:'p10', cat:'inv',  tag:'Inversion 倒立', en:'Salamba Sirsasana', tc:'頭倒立',
          pts:['全身循環與專注|Circulation & focus','序列的核心倒立|Key inversion of the sequence','鎮定與提神|Calm yet revitalising'] },
        { id:'p11', cat:'bend', tag:'Bend Forward II', en:'Adho Mukha Virasana', tc:'嬰兒式（英雄前彎）',
          pts:['緩和並延展背部|Soothe & lengthen the back','倒立後的中和|Neutralise after inversion','放鬆肩頸|Release neck & shoulders'] },
        { id:'p12', cat:'bend', tag:'Bend Forward III', en:'Padangusthasana', tc:'手抓大腳趾前彎',
          pts:['延展腿後側|Lengthen hamstrings','穩定骨盆|Stabilise the pelvis','準備肩倒立|Prepare for shoulderstand'] },
        { id:'p13', cat:'inv',  tag:'Inversion 倒立', en:'Salamba Sarvangasana', tc:'肩倒立', shots:4,
          pts:['鎮定神經系統|Calm the nervous system','平衡甲狀腺|Balance the thyroid','收攝與內觀|Drawing inward'] },
      ]
    },
    {
      num:'三', t:'Seated Twists & Forward Bends', tc:'坐姿扭轉與前彎',
      poses:[
        { id:'p14', cat:'rot',  tag:'Rotation II', en:'Marichyasana I', tc:'聖哲馬里奇式 I', shots:4,
          pts:['坐姿扭轉與前彎|Seated twist & forward bend','按摩腹部器官|Massage abdominal organs','延展肩膀|Open the shoulders'] },
        { id:'p15', cat:'rot',  tag:'Rotation III', en:'Marichyasana III', tc:'聖哲馬里奇式 III', shots:2,
          pts:['深層脊椎扭轉|Deep spinal twist','刺激消化|Aid digestion','增加脊椎靈活度|Increase spinal mobility'] },
        { id:'p16', cat:'base', tag:'Seated 坐姿', en:'Virasana', tc:'英雄坐姿', shots:3,
          pts:['建立坐姿基礎|Establish a seated base','延展大腿前側與腳踝|Stretch thighs & ankles','穩定呼吸|Steady the breath'] },
        { id:'p17', cat:'rot',  tag:'Rotation IV', en:'Parsva Virasana', tc:'側英雄扭轉', shots:2,
          pts:['坐姿扭轉|Seated twist','延伸脊椎|Extend the spine','平衡左右兩側|Balance both sides'] },
        { id:'p18', cat:'bend', tag:'Bend Forward V', en:'Trianga Mukhaikapada Paschimottanasana', tc:'單腿跪坐前彎', shots:5,
          pts:['不對稱前彎|Asymmetric forward bend','延展腿後側|Lengthen the hamstrings','平衡骨盆|Level the pelvis'] },
      ]
    },
    {
      num:'四', t:'Relaxation', tc:'收攝',
      poses:[
        { id:'p19', cat:'base', tag:'收攝 Transition', en:'Savasana', tc:'攤屍式', shots:4,
          pts:['完全放鬆|Complete relaxation','吸收練習成果|Absorb the practice','回到平靜呼吸|Return to calm breath'] },
      ]
    },
  ];

  // ── Render legend ──
  const legendEl = document.getElementById('legend');
  Object.values(CAT).forEach(c=>{
    const it=document.createElement('div'); it.className='it';
    it.innerHTML=`<span class="dot" style="background:${c.dot}"></span>${c.label}`;
    legendEl.appendChild(it);
  });

  // ── Render pose pages (one pose = one page) ──
  const pagesEl = document.getElementById('pages');
  let poseIndex = 0;
  const TOTAL = SECTIONS.reduce((a,s)=>a+s.poses.length,0);
  SECTIONS.forEach(sec=>{
    sec.poses.forEach(p=>{
      poseIndex++;
      const cat=CAT[p.cat];
      const caps = Array.isArray(p.shots) ? p.shots : null;
      const n = caps ? caps.length : (p.shots||1);
      const perRow = Math.min(Math.max(n,1),4);
      const rows = Math.ceil(n/perRow);
      const shotH = rows>1 ? 236 : (n===1 ? 560 : 430);
      const slots=[];
      for(let k=0;k<n;k++){
        const sid = k===0 ? p.id : `${p.id}-${k}`;
        const ph = n>1 ? `${p.en} · ${k+1}` : p.en;
        const cap = caps && caps[k] ? `<span class="cap">${caps[k]}</span>` : '';
        slots.push(`<div class="shot" style="height:${shotH}px">`+
          `<img class="ph-img" src="photos/${sid}.jpg" alt="${ph}" loading="lazy" `+
          `onload="this.classList.add('loaded')" onerror="this.classList.add('missing')"/>`+
          `<div class="ph-empty"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="1.6"/><path d="M3 17l5-4 4 3 3-2 6 5"/></svg><span>${ph}</span></div>`+
          `${cap}</div>`);
      }
      const ul=`<ul>${p.pts.map(x=>{const [tc,en]=x.split('|');return `<li>${en?`<span class="pt-en">${en}</span>`:''}<span class="pt-tc">${tc}</span></li>`;}).join('')}</ul>`;
      let note='';
      if(p.note){const [nen,ntc]=p.note.split('|');note=`<div class="note"><span class="note-en">${nen}</span>${ntc?`<span class="note-tc">${ntc}</span>`:''}</div>`;}
      const num=p.id.replace('p','').replace(/^0/,'');
      const page=document.createElement('div');
      page.className=`page pose ${cat.cls}`;
      page.innerHTML=`
        <div class="pageband">
          <span class="num">${num}</span>
          <span class="t">${p.en}</span>
          <span class="tc">${p.tc}</span>
          <span class="rule"></span>
          <span class="chip">${p.tag}</span>
        </div>
        <div class="photo" style="grid-template-columns:repeat(${perRow},1fr)">${slots.join('')}</div>
        <div class="poseinfo">${ul}${note}</div>
        <div class="pagefoot">
          <span>${sec.t} · ${sec.tc}</span>
          <span class="brand">MUYOGA</span>
          <span>${poseIndex} / ${TOTAL}</span>
        </div>`;
      pagesEl.appendChild(page);
    });
  });

  // ── Render flow overview ──
  const flowEl=document.getElementById('flowrow');
  const allPoses=SECTIONS.flatMap(s=>s.poses);
  allPoses.forEach((p,i)=>{
    const cat=CAT[p.cat];
    const chip=document.createElement('span');
    chip.className='fchip';
    chip.style.background=cat.dot;
    chip.style.color='var(--ink)';
    const shortEn=p.en.split('(')[0].trim();
    chip.innerHTML=`<span class="fn">${i+1}</span><span class="fchip-txt"><span class="fchip-en">${shortEn}</span><span class="fchip-tc">${p.tc}</span></span>`;
    flowEl.appendChild(chip);
    if(i<allPoses.length-1){
      const a=document.createElement('span'); a.className='farrow'; a.textContent='→';
      flowEl.appendChild(a);
    }
  });
</script>
</body>
</html>
